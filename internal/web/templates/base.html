{{define "base.html"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{if .Title}}{{.Title}} · Loupe{{else}}Loupe{{end}}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><circle cx='10' cy='10' r='6.5' fill='none' stroke='%2334dfe0' stroke-width='1.7'/><line x1='14.8' y1='14.8' x2='21' y2='21' stroke='%2334dfe0' stroke-width='2' stroke-linecap='round'/></svg>">
    <link rel="stylesheet" href="/static/app.css">
    <script src="/static/htmx.min.js" defer></script>
    <script src="/static/highlight.js" defer></script>
</head>
<body>
    <header class="rail">
        <a class="brand" href="/" aria-label="Loupe — home">
            <svg class="lens" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="10" cy="10" r="6.5"/>
                <line x1="10" y1="1.6" x2="10" y2="4.2"/>
                <line x1="1.6" y1="10" x2="4.2" y2="10"/>
                <line x1="10" y1="15.8" x2="10" y2="18.4"/>
                <line class="handle" x1="14.9" y1="14.9" x2="21" y2="21"/>
            </svg>
            <span class="brand-name">Loupe</span>
            <span class="brand-sub">relying-party inspector</span>
        </a>
        <nav class="rail-nav">
            <a href="/profiles">Profiles</a>
            <a href="/history">History</a>
            <a href="/tools">Tools</a>
        </nav>
    </header>
    <main class="container">
        {{block "content" .}}{{end}}
    </main>
</body>
</html>{{end}}
