services:
  # Standalone Loupe using the embedded SQLite backend — no external database.
  # The database lives on the loupe_data volume inside the container. It is in the
  # "standalone" profile so it does not clash with keycloak's :8080 by default.
  # Start it on its own with:  docker compose --profile standalone up loupe
  loupe:
    build: .
    profiles: ["standalone"]
    environment:
      DB_DRIVER: sqlite
      SQLITE_PATH: /data/loupe.db
      BASE_URL: http://localhost:8080
      # Set a real passphrase to enable storing secrets (client_secret, SP key).
      MASTER_KEY: change-me
    ports:
      - "8080:8080"
    volumes:
      - loupe_data:/data

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: loupe
      POSTGRES_PASSWORD: loupe
      POSTGRES_DB: loupe
    ports:
      - "5432:5432"
    volumes:
      - loupe_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loupe"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Keycloak for local integration testing (dev mode, ephemeral H2 storage).
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"

volumes:
  loupe_pgdata:
  loupe_data:
